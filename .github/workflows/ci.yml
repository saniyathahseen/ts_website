name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Run stylelint
        run: npx stylelint "src/**/*.css" "src/**/*.module.css" --allow-empty-input

      - name: Build (production)
        run: npm run build --silent

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run screenshots (Playwright)
        env:
          SCREENSHOT_BASE: http://localhost:8080
        run: |
          # Serve the build and run the screenshot script
          npx http-server build -p 8080 &
          pid=$!
          sleep 1
          node tools/screenshot.js
          kill $pid || true

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: build_snapshots/
